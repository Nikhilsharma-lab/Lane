name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly sweep — catches secrets that slipped in before the workflow existed.
    - cron: '0 14 * * 1'

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
